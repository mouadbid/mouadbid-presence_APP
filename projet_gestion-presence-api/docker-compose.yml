version: '3.8'

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: toor
      MYSQL_DATABASE: estc2025
      MYSQL_USER: estc
      MYSQL_PASSWORD: estc2025
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
      # Optionnel : déposez votre script .sql ici pour initialiser la base au démarrage
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: toor
    depends_on:
      - db
    networks:
      - app-network

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "mysql+pymysql://estc:estc2025@db/estc2025"
      JWT_SECRET: "votre_cle_secrete_2025"
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
